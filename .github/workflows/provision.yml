name: Provision infra (Terraform)

# Manual only — we never want `terraform apply` running on a code push.
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

concurrency:
  group: infra-provision
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      DIGITALOCEAN_TOKEN:         ${{ secrets.DO_TOKEN }}
      TF_TOKEN_app_terraform_io:  ${{ secrets.TF_API_TOKEN }}
      TF_VAR_ssh_key_fingerprints: ${{ secrets.DO_SSH_FINGERPRINTS }}
      TF_VAR_docr_registry:       ${{ vars.DOCR_REGISTRY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: inputs.action == 'plan'
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve -no-color

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve -no-color

      - name: Outputs
        if: inputs.action == 'apply'
        run: |
          echo "::notice::Copy the public_ip value below into the DROPLET_HOST repository secret"
          terraform output
