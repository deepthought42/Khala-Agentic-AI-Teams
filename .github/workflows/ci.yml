name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agents/

  test-software-engineering:
    name: Test – Software Engineering Team
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: agents
    env:
      SW_LLM_PROVIDER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r software_engineering_team/requirements.txt
      - run: pip install -e software_engineering_team
      - run: pytest software_engineering_team/tests/ -v --tb=short

  test-blogging:
    name: Test – Blogging
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r blogging/requirements.txt
      - run: pytest blogging/tests/ -v --tb=short

  test-market-research:
    name: Test – Market Research
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest market_research_team/tests/ -v --tb=short

  test-soc2:
    name: Test – SOC2 Compliance
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest soc2_compliance_team/tests/ -v --tb=short

  test-social-marketing:
    name: Test – Social Marketing
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest social_media_marketing_team/tests/ -v --tb=short

  test-ui:
    name: Test – Angular UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-interface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: user-interface/package-lock.json
      - run: npm ci
      - run: npx ng test --no-watch --browsers=ChromeHeadless

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: [test-software-engineering, test-blogging]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t strands-agents:ci agents/
