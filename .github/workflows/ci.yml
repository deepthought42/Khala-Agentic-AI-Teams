name: CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main, development]
  push:
    branches: [master, main, development]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agents/ unified_api/ blogging_service/ team_service/

  lint-frontend:
    name: Lint Angular (ng lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-interface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-v1-${{ runner.os }}-${{ hashFiles('user-interface/package-lock.json') }}
          restore-keys: npm-v1-${{ runner.os }}-
      - run: npm ci
      - run: npm run lint

  # ── Tests ───────────────────────────────────────────────────────────────────

  test-shared-postgres:
    name: Test – shared_postgres (live Postgres)
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      # Apply every team's schema to the live Postgres to catch
      # cross-team DDL conflicts before any team test runs.
      # PYTHONPATH=.. adds backend/ to sys.path so the registry can
      # import unified_api.postgres and job_service.postgres (both of
      # which live under backend/ rather than backend/agents/). The
      # python process's implicit sys.path[0]="" covers the
      # working-directory (backend/agents/) for the team modules.
      - name: register_all_team_schemas against live Postgres
        env:
          PYTHONPATH: ..
        run: python -c "from shared_postgres import register_all_team_schemas; r = register_all_team_schemas(); assert all(r.values()), r"
      - run: pytest shared_postgres/tests/ -v --tb=short

  test-software-engineering:
    name: Test – Software Engineering Team
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    env:
      LLM_PROVIDER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/agents/requirements.txt
            backend/agents/software_engineering_team/requirements.txt
      - run: pip install -r requirements.txt -r software_engineering_team/requirements.txt
      - run: pip install -e software_engineering_team
      - run: pytest software_engineering_team/tests/ -v --tb=short

  test-blogging:
    name: Test – Blogging
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/agents/requirements.txt
            backend/agents/blogging/requirements.txt
      - run: pip install -r requirements.txt -r blogging/requirements.txt
      - run: pytest blogging/tests/ -v --tb=short

  test-market-research:
    name: Test – Market Research
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest market_research_team/tests/ -v --tb=short

  test-soc2:
    name: Test – SOC2 Compliance
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest soc2_compliance_team/tests/ -v --tb=short

  test-social-marketing:
    name: Test – Social Marketing
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest social_media_marketing_team/tests/ -v --tb=short

  test-ui:
    name: Test – Angular UI
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: user-interface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-v1-${{ runner.os }}-${{ hashFiles('user-interface/package-lock.json') }}
          restore-keys: npm-v1-${{ runner.os }}-
      - run: npm ci
      - run: npm run test:coverage

  # ── Gate ────────────────────────────────────────────────────────────────────
  # Single convergence point: both build jobs must wait for every test suite
  # (backend and frontend) so neither image can be published while any suite
  # is red, preventing partial releases where only one image reaches Docker Hub.

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - test-shared-postgres
      - test-software-engineering
      - test-blogging
      - test-market-research
      - test-soc2
      - test-social-marketing
      - test-ui
    steps:
      - run: echo "All lint, test, and build checks passed."

  # ── Build & Deploy ──────────────────────────────────────────────────────────
  # On pull_request: build only (validates the image can be built).
  # On push to main/development (merged PR): build + push to GHCR.
  #
  # No extra secrets or variables required — GITHUB_TOKEN is used automatically.
  # Images are published to:
  #   ghcr.io/<owner>/strands-agents
  #   ghcr.io/<owner>/strands-ui

  build-backend:
    name: Build Backend Docker image
    runs-on: ubuntu-latest
    needs:
      - all-checks
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/strands-agents
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-team-services:
    name: "Build ${{ matrix.service }} Docker image"
    runs-on: ubuntu-latest
    needs:
      - all-checks
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: strands-blogging-service
            dockerfile: backend/blogging_service/Dockerfile
          - service: strands-team-service
            dockerfile: backend/team_service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Docker image
    runs-on: ubuntu-latest
    needs:
      - all-checks
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/strands-ui
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: user-interface
          file: user-interface/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
