name: CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main, development]
  push:
    branches: [master, main, development]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agents/ unified_api/

  lint-frontend:
    name: Lint Angular (ng lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-interface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: user-interface/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Tests ───────────────────────────────────────────────────────────────────

  test-software-engineering:
    name: Test – Software Engineering Team
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    env:
      SW_LLM_PROVIDER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/agents/requirements.txt
            backend/agents/software_engineering_team/requirements.txt
      - run: pip install -r requirements.txt -r software_engineering_team/requirements.txt
      - run: pip install -e software_engineering_team
      - run: pytest software_engineering_team/tests/ -v --tb=short

  test-blogging:
    name: Test – Blogging
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/agents/requirements.txt
            backend/agents/blogging/requirements.txt
      - run: pip install -r requirements.txt -r blogging/requirements.txt
      - run: pytest blogging/tests/ -v --tb=short

  test-market-research:
    name: Test – Market Research
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest market_research_team/tests/ -v --tb=short

  test-soc2:
    name: Test – SOC2 Compliance
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest soc2_compliance_team/tests/ -v --tb=short

  test-social-marketing:
    name: Test – Social Marketing
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: backend/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/agents/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest social_media_marketing_team/tests/ -v --tb=short

  test-ui:
    name: Test – Angular UI
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: user-interface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: user-interface/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  # ── Gate ────────────────────────────────────────────────────────────────────
  # Single convergence point: both build jobs must wait for every test suite
  # (backend and frontend) so neither image can be published while any suite
  # is red, preventing partial releases where only one image reaches Docker Hub.

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - test-software-engineering
      - test-blogging
      - test-market-research
      - test-soc2
      - test-social-marketing
      - test-ui
    steps:
      - run: echo "All lint, test, and build checks passed."

  # ── Build & Deploy ──────────────────────────────────────────────────────────
  # On pull_request: build only (validates the image can be built).
  # On push to main/development (merged PR): build + push to Docker Hub.
  #
  # Required secrets:  DOCKERHUB_TOKEN
  # Required variables: DOCKERHUB_USERNAME  (repository variable, not a secret)

  build-backend:
    name: Build Backend Docker image
    runs-on: ubuntu-latest
    needs:
      - all-checks
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/strands-agents
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Docker image
    runs-on: ubuntu-latest
    needs:
      - all-checks
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/strands-ui
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: user-interface
          file: user-interface/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
