name: Build images & deploy to droplet

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'user-interface/**'
      - 'docker/docker-compose.yml'
      - 'docker/docker-compose.docr.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-droplet
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: registry.digitalocean.com

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Build 6 distinct images in parallel, push to DOCR with :latest and :sha
  # All 18 team services share the single strands-team-service image.
  # ────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: strands-job-service
            context: backend/job_service
            dockerfile: backend/job_service/Dockerfile
          - image: strands-blogging-service
            context: backend
            dockerfile: backend/blogging_service/Dockerfile
          - image: strands-team-service
            context: backend
            dockerfile: backend/team_service/Dockerfile
          - image: strands-studio-grid-service
            context: backend
            dockerfile: backend/studiogrid_service/Dockerfile
          - image: strands-unified-api
            context: backend
            dockerfile: backend/Dockerfile
          - image: strands-ui
            context: user-interface
            dockerfile: user-interface/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to DOCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DO_TOKEN }}
          password: ${{ secrets.DO_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ vars.DOCR_REGISTRY }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ vars.DOCR_REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ────────────────────────────────────────────────────────────────────────
  # SSH to the droplet, pull the new images, and roll the stack.
  # First run also clones the repo and writes docker/.env.
  # ────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to droplet
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA:        ${{ github.sha }}
          DOCR_REGISTRY:     ${{ vars.DOCR_REGISTRY }}
          OLLAMA_API_KEY:    ${{ secrets.OLLAMA_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DO_TOKEN:          ${{ secrets.DO_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          envs: GITHUB_SHA,DOCR_REGISTRY,OLLAMA_API_KEY,POSTGRES_PASSWORD,DO_TOKEN
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            # ── Wait for cloud-init bootstrap to finish (first deploy only) ──
            waited=0
            while [ ! -f /root/.strands-bootstrap-complete ]; do
              if [ "$waited" -ge 600 ]; then
                echo "Cloud-init did not finish within 10 minutes." >&2
                exit 1
              fi
              echo "Waiting for cloud-init bootstrap..."
              sleep 10
              waited=$((waited + 10))
            done

            export TAG="${GITHUB_SHA}"
            export DOCR_REGISTRY="${DOCR_REGISTRY}"

            # ── First-run bootstrap: clone repo ───────────────────────────────
            if [ ! -d /opt/strands-agents/.git ]; then
              git clone --depth 50 --branch main \
                https://github.com/deepthought42/strands-agents.git \
                /opt/strands-agents
            fi

            cd /opt/strands-agents
            git fetch --depth 50 origin main
            git reset --hard "${GITHUB_SHA}"

            # ── Ensure .env exists with required secrets ─────────────────────
            if [ ! -f docker/.env ]; then
              cp docker/.env.example docker/.env
              chmod 600 docker/.env
            fi
            # Always refresh secrets (safe: replaces in-place)
            sed -i "s|^OLLAMA_API_KEY=.*|OLLAMA_API_KEY=${OLLAMA_API_KEY}|"     docker/.env
            sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|" docker/.env

            # ── External compose network (idempotent) ────────────────────────
            bash ./docker/ensure-network.sh

            # ── Login to DOCR ────────────────────────────────────────────────
            echo "${DO_TOKEN}" | docker login registry.digitalocean.com \
              -u "${DO_TOKEN}" --password-stdin >/dev/null

            # ── Pull new images and roll the stack ───────────────────────────
            docker compose \
              -f docker/docker-compose.yml \
              -f docker/docker-compose.docr.yml \
              --env-file docker/.env \
              pull

            docker compose \
              -f docker/docker-compose.yml \
              -f docker/docker-compose.docr.yml \
              --env-file docker/.env \
              up -d --no-build --remove-orphans

            # ── Verify ───────────────────────────────────────────────────────
            sleep 15
            docker compose \
              -f docker/docker-compose.yml \
              -f docker/docker-compose.docr.yml \
              ps

            # ── Cleanup dangling images ──────────────────────────────────────
            docker image prune -f >/dev/null
            docker logout registry.digitalocean.com >/dev/null
