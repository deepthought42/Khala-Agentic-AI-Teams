# Default Tool Manifest for Agent Provisioning
# This manifest provisions a full development environment for AI agents.

version: "1.0"
base_image: "python:3.11-slim"

# Additional environment variables for the container
environment:
  PYTHONUNBUFFERED: "1"
  LANG: "C.UTF-8"

tools:
  # PostgreSQL Database
  - name: postgresql
    provisioner: postgres_provisioner
    access_level: read_write
    config:
      database_prefix: "agent_"
      max_connections: 10
    onboarding:
      description: "PostgreSQL database for persistent storage and data management"
      env_var: "POSTGRES_URL"
      getting_started: |
        Connect to your database using the connection string:
          psql $POSTGRES_URL
        
        Your database '{database}' is pre-created and ready to use.
        You have SELECT, INSERT, UPDATE, DELETE permissions.
        
        Example usage:
          import psycopg2
          conn = psycopg2.connect(os.environ['POSTGRES_URL'])

  # Redis Cache
  - name: redis
    provisioner: redis_provisioner
    access_level: read_write
    config:
      key_prefix: "agent:{agent_id}:"
    onboarding:
      description: "Redis key-value store for caching and session data"
      env_var: "REDIS_URL"
      getting_started: |
        Connect to Redis using the connection URL:
          redis-cli -u $REDIS_URL
        
        Your keys are prefixed with '{key_prefix}' for isolation.
        You have GET, SET, DEL, KEYS, EXISTS, EXPIRE, TTL permissions.
        
        Example usage:
          import redis
          r = redis.from_url(os.environ['REDIS_URL'])
          r.set('mykey', 'myvalue')

  # Git Version Control
  - name: git
    provisioner: git_provisioner
    access_level: contributor
    config:
      init_repos:
        - workspace
      generate_ssh_key: true
    onboarding:
      description: "Git version control for code management"
      getting_started: |
        Your workspace repository is initialized at /workspace.
        An SSH keypair has been generated for remote operations.
        
        Git is configured with:
          User: Agent {agent_id}
          Email: agent-{agent_id}@provisioning.local
        
        To push to a remote:
          1. Add your public key (~/.ssh/id_ed25519.pub) to the remote
          2. git remote add origin <remote-url>
          3. git push -u origin main
