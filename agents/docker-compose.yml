version: "3.8"

services:
  strands-agents:
    build:
      context: ..
      dockerfile: agents/Dockerfile
      args:
        SPEC_FILE: ${SPEC_FILE:-agents/docker/default_initial_spec.md}
    container_name: strands-agents
    privileged: true
    volumes:
      - ./workspace:/workspace
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "8080:80"       # UI + API via nginx
      - "5432:5432"     # PostgreSQL
      - "18000:8000"    # Software Engineering API (direct)
      - "18001:8001"    # Blogging API (direct)
      - "18002:8002"    # Market Research API (direct)
      - "18003:8003"    # SOC2 Compliance API (direct)
      - "18004:8004"    # Social Marketing API (direct)
      - "18005:8005"    # Branding API (direct)
    environment:
      SW_LLM_PROVIDER: ollama
      SW_LLM_BASE_URL: http://host.docker.internal:11434
      SW_LLM_MODEL: qwen3-coder-next:cloud
      PYTHONUNBUFFERED: "1"
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
      POSTGRES_DB: strands
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
