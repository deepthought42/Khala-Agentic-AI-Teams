apiVersion: 1

providers:
  - name: khala-default
    orgId: 1
    folder: Khala
    folderUid: khala
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
