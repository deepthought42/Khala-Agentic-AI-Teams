      postgres: { condition: service_healthy }
      temporal: { condition: service_started }
      job-service: { condition: service_healthy }
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://ollama.com}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:397b-cloud}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TEMPORAL_ADDRESS: temporal:7233
      JOB_SERVICE_URL: http://job-service:8085
      BLOG_PLANNING_MAX_ITERATIONS: ${BLOG_PLANNING_MAX_ITERATIONS:-5}
      BLOG_PLANNING_MAX_PARSE_RETRIES: ${BLOG_PLANNING_MAX_PARSE_RETRIES:-3}
      BLOG_PLANNING_MODEL: ${BLOG_PLANNING_MODEL:-}
      BLOGGING_MEDIUM_STATS_ROOT: ${BLOGGING_MEDIUM_STATS_ROOT:-}
      INTEGRATIONS_BROWSER_SESSION_ROOT: ${INTEGRATIONS_BROWSER_SESSION_ROOT:-}
    extra_hosts: &team-extra-hosts
      - "postgres:172.28.0.2"
      - "temporal:172.28.0.3"
      - "job-service:172.28.0.5"
    ports: ["8090:8090"]
    networks:
      stack: { ipv4_address: 172.28.0.8, aliases: [blogging-service] }
    restart: unless-stopped
    healthcheck: &team-healthcheck-8090
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5

