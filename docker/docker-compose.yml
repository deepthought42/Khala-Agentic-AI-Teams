  # ── Unified API (router/proxy) ──────────────────────────────────────────────

  strands-agents:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: strands-unified-api
    container_name: strands-agents
    depends_on:
      postgres: { condition: service_healthy }
      temporal: { condition: service_started }
      job-service: { condition: service_healthy }
      blogging-service: { condition: service_healthy }
      se-service: { condition: service_healthy }
      pa-service: { condition: service_healthy }
      market-research-service: { condition: service_healthy }
      soc2-service: { condition: service_healthy }
      social-marketing-service: { condition: service_healthy }
      branding-service: { condition: service_healthy }
      agent-provisioning-service: { condition: service_healthy }
      a11y-service: { condition: service_healthy }
      ai-systems-service: { condition: service_healthy }
      investment-service: { condition: service_healthy }
      nutrition-service: { condition: service_healthy }
      planning-v3-service: { condition: service_healthy }
      coding-team-service: { condition: service_healthy }
      studio-grid-service: { condition: service_healthy }
      sales-service: { condition: service_healthy }
      road-trip-service: { condition: service_healthy }
    volumes:
      - agents_workspace:/workspace
    ports:
      - "8888:8080"
    deploy:
      resources:
        limits: { cpus: "8", memory: 2G }
        reservations: { memory: 2G }
    cpus: "8"
    mem_limit: 2g
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://ollama.com}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:397b-cloud}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      ENABLE_LOG_API: ${ENABLE_LOG_API:-0}
      TEMPORAL_ADDRESS: temporal:7233
      JOB_SERVICE_URL: http://job-service:8085
      # Team service URLs — proxy requests to team containers
      BLOGGING_SERVICE_URL: http://blogging-service:8090
