# Full stack: Postgres, Temporal, strands-agents (unified API), and Angular UI.
# Run from repo root: docker compose -f docker/docker-compose.yml --env-file docker/.env up --build
# Ports: 5432 Postgres, 7233 Temporal gRPC, 8080 Temporal UI, 4201 Angular UI, 8888 Unified API (direct)
#
# Static IPs and extra_hosts avoid reliance on Podman's embedded DNS (which can timeout resolving service names).
# Network "strands-stack" is external: create once with docker/ensure-network.sh (or see README) to avoid
# repeated "IPAM option driver has changed" errors when using Podman with docker-compose.

services:
  postgres:
    image: postgres:16
    container_name: strands-stack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      stack:
        ipv4_address: 172.28.0.2

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: strands-stack-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      DBNAME: temporal
      SKIP_DB_CREATE: "true"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    extra_hosts:
      - "postgres:172.28.0.2"
    ports:
      - "7233:7233"
    networks:
      stack:
        ipv4_address: 172.28.0.3

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: strands-stack-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    extra_hosts:
      - "temporal:172.28.0.3"
    ports:
      - "8080:8080"
    networks:
      stack:
        ipv4_address: 172.28.0.4

  job-service:
    build:
      context: ../backend/job_service
      dockerfile: Dockerfile
    image: strands-job-service
    container_name: strands-job-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
      POSTGRES_DB: strands_jobs
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "postgres:172.28.0.2"
    ports:
      - "8585:8085"
    networks:
      stack:
        ipv4_address: 172.28.0.5
        aliases:
          - job-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Team Microservices ──────────────────────────────────────────────────────
  # Each agent team runs in its own container using the generic team_service/Dockerfile.
  # Blogging uses its own Dockerfile (needs Playwright/Chromium).
  # StudioGrid uses studiogrid_service/Dockerfile (code lives outside agents/).

  blogging-service:
    build:
      context: ../backend
      dockerfile: blogging_service/Dockerfile
