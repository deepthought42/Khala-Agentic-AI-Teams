# Full stack: Postgres, Temporal, Ollama (optional), strands-agents (unified API), and Angular UI.
# Run from repo root: docker compose -f docker/docker-compose.yml --env-file docker/.env up --build
# Ports: 5432 Postgres, 7233 Temporal gRPC, 8080 Temporal UI, 4200 Angular UI, 8888 Unified API (direct), 11434 Ollama (optional)

services:
  postgres:
    image: postgres:16
    container_name: strands-stack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - stack

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: strands-stack-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      DBNAME: temporal
      SKIP_DB_CREATE: "true"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    networks:
      - stack

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: strands-stack-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"
    networks:
      - stack

  ollama:
    image: ollama/ollama
    container_name: strands-stack-ollama
    ports:
      # Use 11435 on host to avoid conflict with host-installed Ollama (11434)
      - "11435:11434"
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    networks:
      - stack

  strands-agents:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: strands-unified-api
    container_name: strands-agents
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./workspace:/workspace
    ports:
      - "8888:8080"
    environment:
      SW_LLM_PROVIDER: ${SW_LLM_PROVIDER:-ollama}
      SW_LLM_BASE_URL: ${SW_LLM_BASE_URL:-http://ollama:11434}
      SW_LLM_MODEL: ${SW_LLM_MODEL:-qwen3.5:397b-cloud}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      ENABLE_LOG_API: ${ENABLE_LOG_API:-0}
    networks:
      stack:
        aliases:
          - unified-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../user-interface
      dockerfile: Dockerfile
    image: strands-ui
    container_name: strands-ui
    ports:
      - "4200:80"
    depends_on:
      strands-agents:
        condition: service_healthy
    networks:
      - stack
    restart: unless-stopped

networks:
  stack:
    name: strands-stack

volumes:
  postgres_data:
