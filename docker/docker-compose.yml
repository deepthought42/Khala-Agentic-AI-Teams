# Full stack: Postgres, Temporal, strands-agents (unified API), and Angular UI.
# Run from repo root: docker compose -f docker/docker-compose.yml --env-file docker/.env up --build
# Ports: 5432 Postgres, 7233 Temporal gRPC, 8080 Temporal UI, 4201 Angular UI, 8888 Unified API (direct)
#
# Static IPs and extra_hosts avoid reliance on Podman's embedded DNS (which can timeout resolving service names).

services:
  postgres:
    image: postgres:16
    container_name: strands-stack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      stack:
        ipv4_address: 172.28.0.2

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: strands-stack-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      DBNAME: temporal
      SKIP_DB_CREATE: "true"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    extra_hosts:
      - "postgres:172.28.0.2"
    ports:
      - "7233:7233"
    networks:
      stack:
        ipv4_address: 172.28.0.3

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: strands-stack-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    extra_hosts:
      - "temporal:172.28.0.3"
    ports:
      - "8080:8080"
    networks:
      stack:
        ipv4_address: 172.28.0.4

  strands-agents:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: strands-unified-api
    container_name: strands-agents
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - ./workspace:/workspace
    ports:
      - "8888:8080"
    # All agents use central LLM; default Ollama Cloud. Set OLLAMA_API_KEY in docker/.env (https://ollama.com/settings/keys).
    environment:
      SW_LLM_PROVIDER: ${SW_LLM_PROVIDER:-ollama}
      SW_LLM_BASE_URL: ${SW_LLM_BASE_URL:-https://ollama.com}
      SW_LLM_MODEL: ${SW_LLM_MODEL:-qwen3.5:397b-cloud}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      ENABLE_LOG_API: ${ENABLE_LOG_API:-0}
      TEMPORAL_ADDRESS: temporal:7233
    extra_hosts:
      - "postgres:172.28.0.2"
      - "temporal:172.28.0.3"
    networks:
      stack:
        ipv4_address: 172.28.0.6
        aliases:
          - unified-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../user-interface
      dockerfile: Dockerfile
    image: strands-ui
    container_name: strands-ui
    ports:
      - "4201:80"
    depends_on:
      strands-agents:
        condition: service_healthy
    extra_hosts:
      - "unified-api:172.28.0.6"
    networks:
      stack:
        ipv4_address: 172.28.0.7
    restart: unless-stopped

networks:
  stack:
    name: strands-stack
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data:
