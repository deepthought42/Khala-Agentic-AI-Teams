# Backend (Unified API) + Frontend (Angular UI). Run from backend: docker compose up --build
# UI: http://localhost:4200  API: http://localhost:4200/api  Docs: http://localhost:4200/docs

services:
  unified-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: strands-unified-api
    container_name: strands-unified-api
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      SW_LLM_PROVIDER: ${SW_LLM_PROVIDER:-ollama}
      SW_LLM_BASE_URL: ${SW_LLM_BASE_URL:-https://ollama.com}
      SW_LLM_MODEL: ${SW_LLM_MODEL:-qwen3.5:397b-cloud}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../user-interface
      dockerfile: Dockerfile
    image: strands-ui
    container_name: strands-ui
    ports:
      - "4200:80"
    depends_on:
      unified-api:
        condition: service_healthy
    restart: unless-stopped
