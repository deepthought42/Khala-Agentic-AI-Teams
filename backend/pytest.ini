[pytest]
# Run tests per team from repo root, e.g.:
#   pytest agents/software_engineering_team/tests/ -v
#   pytest agents/blogging/tests/ -v
#   pytest agents/market_research_team/tests/ -v
#   pytest agents/soc2_compliance_team/tests/ -v
#   pytest agents/social_media_marketing_team/tests/ -v
#
# Or from each team directory: cd agents/<team> && pytest
addopts = -v
pythonpath = agents
# Ignore test repos and generated artifacts
testpaths = agents unified_api
norecursedirs = .git .hypothesis __pycache__ *.egg-info .venv venv node_modules dist
markers =
    slow_subprocess: test spawns a strategy subprocess; adds ~1s wall-clock overhead per invocation.
