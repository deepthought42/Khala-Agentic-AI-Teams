[tool.ruff]
target-version = "py310"
line-length = 120
src = ["agents"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line-length handled by formatter
    "N802",  # function name should be lowercase (some agents use CamelCase)
    "N806",  # variable in function should be lowercase
    "B904",  # raise-without-from (many re-raises are intentional)
    "SIM108", # ternary operator (readability preference)
]

[tool.ruff.lint.isort]
known-first-party = ["shared", "backend_agent", "frontend_team", "devops_agent", "qa_agent"]

[tool.ruff.lint.per-file-ignores]
"agents/**/tests/**" = ["N", "B", "E402"]
"agents/**/agent_implementations/**" = ["E", "F"]
"agents/**/api/main.py" = ["E402"]
"agents/**/api/*.py" = ["E402"]
"agents/blogging/blog_research_agent/agent.py" = ["E402"]
"agents/software_engineering_team/orchestrator.py" = ["E402"]
"agents/software_engineering_team/devops_team/orchestrator.py" = ["E402"]
"agents/software_engineering_team/architect-agents/**" = ["E402"]
"unified_api/main.py" = ["E402"]
"unified_api/tests/**" = ["E402"]

[tool.pytest.ini_options]
addopts = "--cov=agents --cov=unified_api --cov-report=term-missing --cov-fail-under=85"

[tool.coverage.run]
source = ["agents", "unified_api"]
omit = ["*/tests/*", "*/conftest.py", "*/__init__.py"]

[tool.coverage.report]
fail_under = 85
show_missing = true
skip_covered = false
