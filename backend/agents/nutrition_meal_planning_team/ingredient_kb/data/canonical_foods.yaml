# Canonical ingredient catalog. SPEC-005 §4.3.
#
# v1 seed covers ~120 ingredients chosen to:
#   - Cover every FDA Big-9 + EU-14 allergen category with at least
#     one exemplar.
#   - Cover every canonical_id referenced in densities.yaml.
#   - Cover the high-frequency foods most likely to appear in LLM-
#     generated meal outputs during shadow-mode audits.
#
# The aspirational 2000-entry v1.0.0 target in SPEC-005 §4.4 is left
# as a curation backlog. The audit CLI reports the top-N unresolved
# strings from production so gaps get prioritized by real frequency
# rather than guesswork.
#
# Lint rules (enforced by cli/add.py and tests):
#   - id is snake_case, globally unique, ASCII.
#   - aliases include display_name lowercased.
#   - allergen_tags for regulated categories (FDA Big-9) require a
#     non-empty citations.allergen string.
#   - Variants that differ in allergen profile (tamari vs soy sauce)
#     are separate ids, not aliases.

