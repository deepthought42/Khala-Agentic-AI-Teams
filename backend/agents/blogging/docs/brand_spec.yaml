# Brand Spec for Brandon Kindred
# Single source of truth for voice, formatting, and content rules.
# Derived from brandon_kindred_brand_and_writing_style_guide.md

brand:
  name: "Brandon Kindred"
  audience: "Software engineers of all levels, especially beginners; startup founders; DevOps, cloud, and platform engineers; people who care about web accessibility"
  purpose: "Teach from real experience. Truth over hype. Practical over performative. Reader leaves feeling: I get it now. I can try this today."

voice:
  tone:
    - friendly
    - informal
    - conversational
    - confident
    - helpful
  style_notes:
    - "Avoid corporate jargon"
    - "Prefer clear, concrete language"
    - "Use dad jokes and light sarcasm in small doses"
    - "Do not brag; tie experience to what the reader gains"
    - "No cringe bravado, no guru vibe"
  banned_phrases:
    - "corporate buzzword soup"
    - "crushing it"
    - "in today's fast-paced world"
    - "delve into"
    - "unlock the power of"
    - "smash like and subscribe"
    - "buy my course"
    - "just do X"
  banned_patterns:
    - "excessive_exclamation"
    - "generic_ai_openers"
    - "em_dash"
    - "en_dash"

readability:
  target_grade_level: 8
  max_grade_level: 10

formatting:
  require_sections: true
  min_paragraph_sentences: 2
  max_paragraph_sentences: 5
  prefer_short_paragraphs: true
  disallow_em_dash: true
  avoid_excessive_bullets: true
  required_section_headings:
    - "Hook"
    - "Explain the idea"
    - "Wrap up"

content_rules:
  claims_policy:
    require_allowed_claims: false
    require_citations_for_factual_claims: true
  safety:
    require_disclaimer_for:
      - medical
      - legal
      - financial

examples:
  on_brand:
    - "I used to think scale meant a few million records. Then I joined AWS ProServe."
    - "Remote state in Terraform is not a nice to have. It is how you keep your team from stepping on each other."
  off_brand:
    - "In today's fast-paced world, we must delve into unlocking the power of scalable solutions."
    - "Smash that like button and subscribe for more content!"