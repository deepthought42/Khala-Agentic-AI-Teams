# Unified API server (backend folder structure + Makefile).
# Run from repo root: docker compose -f backend/agents/docker-compose.yml up --build
# Or from backend: docker compose -f agents/docker-compose.yml up --build
# API: http://localhost:8080  Docs: http://localhost:8080/docs

version: "3.8"

services:
  khala-unified-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: khala-unified-api
    container_name: khala-unified-api
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:397b-cloud}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
