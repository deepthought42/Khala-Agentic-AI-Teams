agents:
  startup_advisor_orchestrator:
    description: Coordinates startup-advice workflows, asks clarifying questions, and routes founder requests to specialist startup agents.
    prompt_file: prompts/agents/startup_advisor_orchestrator.md
    tools:
      - chat_history_tool
      - web_research_tool
      - founder_profile_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - startup_strategy
      - advisor_orchestration
      - founder_context_synthesis
    actions:
      - gather_missing_context
      - route_specialist_requests
      - synthesize_team_recommendation
    keywords:
      - startup
      - founder
      - advisor
      - strategy
      - goals
      - constraints
      - roadmap
    resources:
      - type: artifact
        name: founder_profile
        required: false
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: startup_advice_plan

  customer_discovery_advisor:
    description: Guides customer discovery, problem interviews, and ICP refinement for early-stage startups.
    prompt_file: prompts/agents/customer_discovery_advisor.md
    tools:
      - chat_history_tool
      - web_research_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - customer_discovery
      - interview_design
      - icp_definition
    actions:
      - assess_founder_assumptions
      - propose_interview_plan
      - define_problem_hypotheses
    keywords:
      - customer
      - interview
      - problem
      - icp
      - validation
      - discovery
    resources:
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: discovery_brief

  product_strategy_advisor:
    description: Helps define MVP scope, roadmap sequencing, and product strategy aligned to validated customer pain.
    prompt_file: prompts/agents/product_strategy_advisor.md
    tools:
      - chat_history_tool
      - web_research_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - mvp_scoping
      - product_strategy
      - roadmap_prioritization
    actions:
      - prioritize_features
      - recommend_mvp_scope
      - define_learning_milestones
    keywords:
      - product
      - mvp
      - roadmap
      - feature
      - scope
      - prioritization
    resources:
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: product_strategy_memo

  growth_gtm_advisor:
    description: Advises on go-to-market strategy, demand generation, and channel experimentation.
    prompt_file: prompts/agents/growth_gtm_advisor.md
    tools:
      - chat_history_tool
      - web_research_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - go_to_market
      - growth_experiments
      - positioning
    actions:
      - design_channel_tests
      - suggest_positioning
      - plan_launch_sequence
    keywords:
      - growth
      - gtm
      - marketing
      - acquisition
      - channel
      - positioning
    resources:
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: gtm_experiment_plan

  fundraising_finance_advisor:
    description: Supports fundraising narrative, financial planning, and investor-readiness strategy.
    prompt_file: prompts/agents/fundraising_finance_advisor.md
    tools:
      - chat_history_tool
      - web_research_tool
      - founder_profile_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - fundraising_strategy
      - startup_finance
      - investor_storytelling
    actions:
      - draft_fundraising_plan
      - identify_key_metrics
      - pressure_test_use_of_funds
    keywords:
      - fundraising
      - runway
      - investor
      - finance
      - burn
      - valuation
    resources:
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: fundraising_strategy_memo

  operations_legal_advisor:
    description: Covers operational setup, execution rhythms, and practical legal/compliance considerations for startups.
    prompt_file: prompts/agents/operations_legal_advisor.md
    tools:
      - chat_history_tool
      - web_research_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - startup_operations
      - process_design
      - compliance_basics
    actions:
      - suggest_operating_cadence
      - identify_operational_risks
      - outline_legal_checklist
    keywords:
      - operations
      - legal
      - compliance
      - process
      - hiring
      - execution
    resources:
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: operations_playbook

  founder_coach_advisor:
    description: Coaches founders on decision-making, leadership, and resilience while keeping strategy grounded in evidence.
    prompt_file: prompts/agents/founder_coach_advisor.md
    tools:
      - chat_history_tool
      - founder_profile_tool
      - web_research_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - founder_coaching
      - leadership
      - decision_frameworks
    actions:
      - identify_decision_tradeoffs
      - ask_reflective_questions
      - propose_next_best_actions
    keywords:
      - founder
      - leadership
      - motivation
      - decision
      - stress
      - team
    resources:
      - type: artifact
        name: chat_history
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: founder_coaching_note

