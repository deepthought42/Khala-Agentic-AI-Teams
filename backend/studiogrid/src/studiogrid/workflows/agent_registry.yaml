agents:
  design_lead:
    description: Leads design-system planning and turns intake requirements into implementation-ready artifacts.
    prompt_file: prompts/agents/design_lead.md
    tools:
      - figma_tool
      - contrast_check_tool
    permissions:
      - read_artifacts
      - write_artifacts
    skills:
      - design_system_architecture
      - accessibility_review
      - ui_specification
    actions:
      - produce_design_spec
      - validate_accessibility
    keywords:
      - design
      - component
      - accessibility
      - figma
      - ui
      - specification
    resources:
      - type: artifact
        name: intake
        required: true
      - type: tool
        name: figma_tool
        required: true
    schemas:
      - kind: ARTIFACT
        artifact_type: task_out
