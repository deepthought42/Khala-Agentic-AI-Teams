version: "3.3"

services:
  strands-agents:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SPEC_FILE: ${SPEC_FILE:-docker/default_initial_spec.md}
    container_name: strands-agents
    privileged: true
    volumes:
      - ./workspace:/workspace
    ports:
      - "18000:8000"
      - "18001:8001"
      - "18002:8002"
      - "18003:8003"
      - "18004:8004"
      - "18005:8005"
    environment:
      SW_LLM_PROVIDER: ollama
      SW_LLM_BASE_URL: http://host.docker.internal:11434
      SW_LLM_MODEL: qwen3-coder-next:cloud
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
