<mat-card>
  <mat-card-header>
    <mat-card-title>Run Planning V3</mat-card-title>
    <mat-card-subtitle>Client-facing discovery and requirements: context, PRD, handoff for dev/UI/UX</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Repository path</mat-label>
      <input matInput [(ngModel)]="repoPath" placeholder="/path/to/repo" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Client name (optional)</mat-label>
      <input matInput [(ngModel)]="clientName" placeholder="Acme Corp" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Initial brief (optional)</mat-label>
      <textarea
        matInput
        [(ngModel)]="initialBrief"
        rows="4"
        placeholder="Problem statement or brief from the client..."
      ></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Spec content (optional)</mat-label>
      <textarea
        matInput
        [(ngModel)]="specContent"
        rows="6"
        placeholder="Full spec content if available..."
      ></textarea>
    </mat-form-field>

    <div class="options-row">
      <mat-checkbox [(ngModel)]="useProductAnalysis">Use Product Requirements Analysis (PRA)</mat-checkbox>
    </div>
    <div class="options-row">
      <mat-checkbox [(ngModel)]="usePlanningV2">Use Planning V2 for full project plan</mat-checkbox>
    </div>
    <div class="options-row">
      <mat-checkbox [(ngModel)]="useMarketResearch">Use Market Research for discovery</mat-checkbox>
    </div>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!canSubmit">
      Run Planning V3
    </button>
  </mat-card-actions>
</mat-card>
