<app-dashboard-shell
  title="Market Research"
  subtitle="User discovery and concept viability, without the consultant invoice."
  icon="insights"
  [healthCheck]="healthCheck"
  healthLabel="Market Research API"
>
  <app-team-assistant-chat
    [teamApiUrl]="'/api/market-research/assistant'"
    [teamName]="'Market Research'"
    [teamDescription]="'Describe your product concept and the team will conduct market research'"
    [fields]="[
      {key: 'product_concept', label: 'Product concept', placeholder: 'Describe your product or service', required: true},
      {key: 'target_users', label: 'Target users', placeholder: 'Who is this product for?', required: true},
      {key: 'business_goal', label: 'Business goal', placeholder: 'What do you want to learn or validate?', required: true},
      {key: 'topology', label: 'Research topology', placeholder: 'unified or split'},
      {key: 'transcripts', label: 'Interview transcripts', placeholder: 'Paste or describe user interview data'}
    ]"
  />
</app-dashboard-shell>
