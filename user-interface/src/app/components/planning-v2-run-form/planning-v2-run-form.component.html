<mat-card>
  <mat-card-header>
    <mat-card-title>Run Planning (v2)</mat-card-title>
    <mat-card-subtitle>Submit a spec and repository path to run the 6-phase product planning workflow</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Specification</mat-label>
      <textarea
        matInput
        [(ngModel)]="specContent"
        rows="8"
        placeholder="Paste or type your product/specification content..."
      ></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Repository Path</mat-label>
      <input matInput [(ngModel)]="repoPath" placeholder="/path/to/repo" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Inspiration / Moodboard (optional)</mat-label>
      <textarea
        matInput
        [(ngModel)]="inspirationContent"
        rows="4"
        placeholder="Optional inspiration, use cases, or moodboard content..."
      ></textarea>
    </mat-form-field>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!canSubmit">
      Run Planning (v2)
    </button>
  </mat-card-actions>
</mat-card>
