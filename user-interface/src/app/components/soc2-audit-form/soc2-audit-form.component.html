<mat-card>
  <mat-card-header>
    <mat-card-title>SOC2 Audit</mat-card-title>
    <mat-card-subtitle>POST /soc2-audit/run</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Repository path</mat-label>
        <input matInput formControlName="repo_path" [attr.aria-label]="'Local path to repository'">
        <mat-hint>Local filesystem path to the code repository to audit</mat-hint>
        @if (form.get('repo_path')?.hasError('required') && form.get('repo_path')?.touched) {
          <mat-error>Repository path is required</mat-error>
        }
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Start Audit
      </button>
    </form>
  </mat-card-content>
</mat-card>
