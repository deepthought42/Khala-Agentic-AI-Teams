<div class="page-toolbar">
  <a mat-button routerLink="/software-engineering">
    <mat-icon>arrow_back</mat-icon>
    Software Engineering
  </a>
</div>

<h1>Coding Team</h1>
<p class="subtitle">
  Sub-team of <strong>Software Engineering</strong>: Tech Lead, stack-specialist Senior Engineers, and Task Graph.
  The full SE pipeline invokes this team after planning; use this page for the assistant or direct API access at
  <code>/api/coding-team</code>.
</p>

<div class="header-row">
  <app-health-indicator [healthCheck]="healthCheck" label="Coding Team API" />
</div>

<app-team-assistant-chat
  [teamApiUrl]="'/api/coding-team/assistant'"
  [teamName]="'Coding Team'"
  [teamDescription]="'Software Engineering sub-team — task graph and implementation'"
  [fields]="[
    {key: 'repo_path', label: 'Repository path', placeholder: 'Path to project repository', required: true},
    {key: 'plan_input', label: 'Plan / tasks (optional)', placeholder: 'Feature descriptions or structured plan hints'}
  ]"
/>
