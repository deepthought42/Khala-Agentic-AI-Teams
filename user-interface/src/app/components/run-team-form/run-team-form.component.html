<mat-card>
  <mat-card-header>
    <mat-card-title>Run Team</mat-card-title>
    <mat-card-subtitle>POST /run-team</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Repo path</mat-label>
        <input matInput formControlName="repo_path" [attr.aria-label]="'Work folder path'">
        <mat-hint>Path with initial_spec.md at root</mat-hint>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Start Team
      </button>
    </form>
  </mat-card-content>
</mat-card>
