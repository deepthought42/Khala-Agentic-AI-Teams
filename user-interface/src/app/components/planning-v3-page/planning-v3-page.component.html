<h1>Planning V3</h1>
<p>Client-facing discovery and requirements: context doc, PRD, and handoff for dev/UI/UX.</p>

<div class="header-row">
  <app-health-indicator [healthCheck]="healthCheck" label="Planning V3 API" />
</div>

<app-team-assistant-chat
  [teamApiUrl]="'/api/planning-v3/assistant'"
  [teamName]="'Planning V3'"
  [teamDescription]="'Scope and plan your project with discovery and requirements gathering'"
  [fields]="[
    {key: 'repo_path', label: 'Repository path', placeholder: 'Path to project repository', required: true},
    {key: 'initial_brief', label: 'Project brief', placeholder: 'Describe what needs to be built', required: true},
    {key: 'client_name', label: 'Client name', placeholder: 'Name of client or project'}
  ]"
/>
