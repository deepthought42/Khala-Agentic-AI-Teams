@if (jobId && status) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Job Status</mat-card-title>
      <mat-card-subtitle>{{ status.status }} - {{ status.current_stage }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p><strong>Progress:</strong> {{ status.progress }}%</p>
      @if (status.eta_hint) {
        <p><strong>ETA:</strong> {{ status.eta_hint }}</p>
      }
      @if (status.status === 'running' || status.status === 'pending') {
        <mat-progress-bar [value]="status.progress"></mat-progress-bar>
      }
      @if (status.error) {
        <p class="error">{{ status.error }}</p>
      }
    </mat-card-content>
  </mat-card>
}
