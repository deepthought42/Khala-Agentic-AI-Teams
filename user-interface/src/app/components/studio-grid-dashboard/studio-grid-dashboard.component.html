<div class="page-header">
  <div class="page-title-row">
    <div class="page-icon">
      <mat-icon>design_services</mat-icon>
    </div>
    <div class="page-title-text">
      <h1>StudioGrid</h1>
      <p>Design-system multi-agent workflow — wireframes, design system, hi-fi, and handoff</p>
    </div>
    <div class="header-health">
      <app-health-indicator [healthCheck]="healthCheck" label="StudioGrid API" />
    </div>
  </div>
</div>

<mat-tab-group animationDuration="200ms" class="studio-tabs">
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">rocket_launch</mat-icon>
      Design Runs
    </ng-template>
    <div class="tab-content">
      <app-studio-grid-run-panel />
    </div>
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">hub</mat-icon>
      Agent Registry
    </ng-template>
    <div class="tab-content">
      <app-studio-grid-agents-registry />
    </div>
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">manage_search</mat-icon>
      Find Agents
    </ng-template>
    <div class="tab-content">
      <app-studio-grid-agent-finder />
    </div>
  </mat-tab>
</mat-tab-group>
