<mat-card>
  <mat-card-header>
    <mat-card-title>Execution Tasks</mat-card-title>
    <mat-card-subtitle>GET /execution/tasks (polling every 60s)</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    @if (data) {
      <pre class="json">{{ data | json }}</pre>
    } @else {
      <p>Loading...</p>
    }
  </mat-card-content>
</mat-card>
