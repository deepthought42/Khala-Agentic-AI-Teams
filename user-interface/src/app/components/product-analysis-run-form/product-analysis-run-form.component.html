<mat-card>
  <mat-card-header>
    <mat-icon mat-card-avatar class="header-icon">analytics</mat-icon>
    <mat-card-title>Product Requirements Analysis</mat-card-title>
    <mat-card-subtitle>
      Analyze product specifications, identify gaps, and generate clarifying questions
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Repository Path</mat-label>
      <input
        matInput
        [(ngModel)]="repoPath"
        placeholder="/path/to/project"
        required
      />
      <mat-hint>Path to the project directory containing initial_spec.md</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Specification Content (optional)</mat-label>
      <textarea
        matInput
        [(ngModel)]="specContent"
        placeholder="Paste spec content here, or leave empty to read from initial_spec.md..."
        rows="8"
      ></textarea>
      <mat-hint>If empty, the spec will be read from initial_spec.md in the repository</mat-hint>
    </mat-form-field>
  </mat-card-content>

  <mat-card-actions align="end">
    <button
      mat-raised-button
      color="primary"
      (click)="submit()"
      [disabled]="!repoPath.trim()"
    >
      <mat-icon>play_arrow</mat-icon>
      Start Analysis
    </button>
  </mat-card-actions>
</mat-card>
