@if (jobId) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Revise</mat-card-title>
      <mat-card-subtitle>POST /social-marketing/revise/{{ jobId }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Feedback</mat-label>
          <textarea matInput formControlName="feedback" rows="3" [attr.aria-label]="'Revision feedback'"></textarea>
          <mat-hint>Min 3 characters</mat-hint>
        </mat-form-field>

        <mat-checkbox formControlName="approved_for_testing" [attr.aria-label]="'Approved for testing'">
          Approved for testing
        </mat-checkbox>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Revise
        </button>
      </form>
    </mat-card-content>
  </mat-card>
}
