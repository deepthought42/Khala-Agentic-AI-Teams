<mat-card class="chat-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon>smart_toy</mat-icon>
      Chat with Your Assistant
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="messages-container" #messagesContainer>
      @for (msg of messages; track msg.timestamp) {
        <div class="message" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
          <div class="message-content">{{ msg.content }}</div>
          <div class="message-time">{{ formatTime(msg.timestamp) }}</div>
        </div>
      }

      @if (loading) {
        <div class="message assistant">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      }
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="input-form">
      <mat-form-field appearance="outline" class="message-input">
        <mat-label>Ask me anything...</mat-label>
        <input
          matInput
          formControlName="message"
          [attr.aria-label]="'Message input'"
          (keydown.enter)="$event.preventDefault(); onSubmit()"
        />
      </mat-form-field>
      <button
        mat-fab
        color="primary"
        type="submit"
        [disabled]="form.invalid || loading"
        [attr.aria-label]="'Send message'"
      >
        <mat-icon>send</mat-icon>
      </button>
    </form>

    <div class="quick-actions">
      @for (action of quickActions; track action.label) {
        <button mat-stroked-button (click)="onQuickAction(action)" [disabled]="loading">
          {{ action.label }}
        </button>
      }
    </div>
  </mat-card-content>
</mat-card>
