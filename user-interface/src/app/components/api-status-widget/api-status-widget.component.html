<div class="widget" role="status" [attr.aria-label]="'API status'">
  <span class="label">APIs:</span>
  @for (s of statuses; track s.name) {
    <span
      class="status"
      [attr.aria-label]="s.name + ': ' + (s.ok ? 'Healthy' : 'Unavailable')"
      [matTooltip]="s.name + ': ' + (s.ok ? 'Healthy' : 'Unavailable')"
    >
      @if (s.ok) {
        <mat-icon color="primary" class="icon">check_circle</mat-icon>
      } @else {
        <mat-icon color="warn" class="icon">error</mat-icon>
      }
    </span>
  }
</div>
