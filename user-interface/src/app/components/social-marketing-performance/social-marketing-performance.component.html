@if (jobId) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>Ingest Performance</mat-card-title>
      <mat-card-subtitle>POST /social-marketing/performance/{{ jobId }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Observations (JSON array)</mat-label>
          <textarea matInput formControlName="observationsJson" rows="5" [attr.aria-label]="'Performance observations as JSON'"></textarea>
          <mat-hint>e.g. array of objects with platform, post_id, engagement_metrics</mat-hint>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Ingest Performance
        </button>
      </form>
    </mat-card-content>
  </mat-card>
}
