<mat-card>
  <mat-card-header>
    <mat-card-title>Market Research</mat-card-title>
    <mat-card-subtitle>POST /market-research/run</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Product concept</mat-label>
        <input matInput formControlName="product_concept" [attr.aria-label]="'Product concept'">
        <mat-hint>Min 3 characters</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Target users</mat-label>
        <input matInput formControlName="target_users" [attr.aria-label]="'Target users'">
        <mat-hint>Min 3 characters</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Business goal</mat-label>
        <input matInput formControlName="business_goal" [attr.aria-label]="'Business goal'">
        <mat-hint>Min 3 characters</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Topology</mat-label>
        <mat-select formControlName="topology" [attr.aria-label]="'Team topology'">
          @for (opt of topologyOptions; track opt.value) {
            <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Transcript folder path</mat-label>
        <input matInput formControlName="transcript_folder_path" [attr.aria-label]="'Transcript folder path'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Transcripts (one per line)</mat-label>
        <textarea matInput formControlName="transcripts" rows="3" [attr.aria-label]="'Transcripts'"></textarea>
      </mat-form-field>

      <mat-checkbox formControlName="human_approved" [attr.aria-label]="'Human approved'">
        Human approved
      </mat-checkbox>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Human feedback</mat-label>
        <textarea matInput formControlName="human_feedback" rows="2" [attr.aria-label]="'Human feedback'"></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Run Market Research
      </button>
    </form>
  </mat-card-content>
</mat-card>
