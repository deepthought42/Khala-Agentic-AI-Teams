<mat-card>
  <mat-card-header>
    <mat-card-title>Run Social Marketing</mat-card-title>
    <mat-card-subtitle>POST /social-marketing/run</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Brand guidelines path</mat-label>
        <input matInput formControlName="brand_guidelines_path" [attr.aria-label]="'Path to brand guidelines'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Brand objectives path</mat-label>
        <input matInput formControlName="brand_objectives_path" [attr.aria-label]="'Path to brand objectives'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>LLM model name</mat-label>
        <input matInput formControlName="llm_model_name" [attr.aria-label]="'LLM model name'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Brand name</mat-label>
        <input matInput formControlName="brand_name" [attr.aria-label]="'Brand name'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Target audience</mat-label>
        <input matInput formControlName="target_audience" [attr.aria-label]="'Target audience'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Goals (comma-separated)</mat-label>
        <input matInput formControlName="goals" [attr.aria-label]="'Goals'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Voice and tone</mat-label>
        <input matInput formControlName="voice_and_tone" [attr.aria-label]="'Voice and tone'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Cadence (posts per day)</mat-label>
        <input matInput type="number" formControlName="cadence_posts_per_day" [attr.aria-label]="'Posts per day'">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Duration (days)</mat-label>
        <input matInput type="number" formControlName="duration_days" [attr.aria-label]="'Duration in days'">
      </mat-form-field>

      <mat-checkbox formControlName="human_approved_for_testing" [attr.aria-label]="'Human approved for testing'">
        Human approved for testing
      </mat-checkbox>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Human feedback</mat-label>
        <textarea matInput formControlName="human_feedback" rows="2" [attr.aria-label]="'Human feedback'"></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Run Social Marketing
      </button>
    </form>
  </mat-card-content>
</mat-card>
