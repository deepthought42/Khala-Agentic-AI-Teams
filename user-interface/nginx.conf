# Serve Angular app and proxy API to the backend (unified-api:8080).
# Used when running in Docker Compose; backend is reachable as host "unified-api".

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Unified API (backend)
    location ~ ^/(api|docs|health|teams|openapi|redoc) {
        proxy_pass http://unified-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA: try file, then directory, then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
